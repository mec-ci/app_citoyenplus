name: Build APK

# Déclencheurs volontairement ciblés pour économiser les minutes GitHub :
# - push sur main (après merge) — pas sur les PR ni les branches de travail
# - tags de version v* (build de release publié)
# - déclenchement manuel à la demande
on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

# Annule un build en cours si un nouveau commit arrive sur la même réf :
# évite d'empiler des runs et de gaspiller des minutes.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # nécessaire pour créer une release sur tag

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter (+ cache SDK & pub)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache Gradle (caches + wrapper). En lecture seule hors main/tags pour
      # ne pas faire grossir le cache depuis des branches éphémères.
      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

      - name: Install dependencies
        run: flutter pub get

      # Signature de release : on n'écrit key.properties que si le keystore est
      # fourni via les secrets. Sinon, le build retombe sur la signature debug
      # (cf. android/app/build.gradle.kts) et produit tout de même un APK.
      - name: Configure release signing
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      # Sur un tag v*, publie l'APK dans une GitHub Release.
      - name: Publish APK to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
